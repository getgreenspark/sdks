components:
  schemas:
    RecordDto:
      required:
      - data
      - host
      - type
      - valid
      type: object
      properties:
        valid:
          type: boolean
          description: The indicator of the DNS record validity.
          example: false
        type:
          type: string
          description: The type of the record that must be added to your domain.
          example: cname
        host:
          type: string
          description: The type of the record that must be added to your domain.
          example: em43944.example.com
        data:
          type: string
          description: The value of the record that must be added to your domain.
          example: u250887955.wl0466.sendgrid.net
    DnsDto:
      required:
      - dkim1
      - dkim2
      - mailCname
      type: object
      properties:
        mailCname:
          description: Record that must be added to your domain.
          allOf:
          - $ref: '#/components/schemas/RecordDto'
        dkim1:
          description: Record that must be added to your domain.
          allOf:
          - $ref: '#/components/schemas/RecordDto'
        dkim2:
          description: Record that must be added to your domain.
          allOf:
          - $ref: '#/components/schemas/RecordDto'
    CustomDomainDto:
      required:
      - dns
      - domain
      - id
      - valid
      type: object
      properties:
        id:
          type: string
          description: The id of the custom domain object.
          example: 63c5857475784b9acf05c919
        domain:
          type: string
          description: The domain name.
          example: example.com
        dns:
          description: This object contains the DNS records that must be added to
            your domain.
          example:
            mailCname:
              valid: false
