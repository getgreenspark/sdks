openapi: 3.0.0
info:
  title: Email
  description: Here you can find documentation and examples for Greenspark Impact
    API
  contact: {}
  version: v1
servers:
- url: https://sandbox.getgreenspark.com
  description: Sandbox environment
- url: https://demo-api.getgreenspark.com
  description: Demo environment
- url: https://api.getgreenspark.com
  description: Production environment
paths:
  /v1/email/domains:
    get:
      tags:
      - Email
      summary: Fetch Domains
      description: Fetch your previously added domains.
      operationId: EmailController_fetchDomains
      parameters: []
      responses:
        "200":
          description: Domains has been successfully queried.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomDomainDto'
                x-content-type: application/json
        "400":
          description: Bad request.
        "401":
          description: Provide your API key.
        "403":
          description: "Please upgrade to a growth, premium or enterprise plan."
        "404":
          description: Not found.
      security:
      - access-key: []
    post:
      tags:
      - Email
      summary: Add Domain
      description: Add your domain and receive the DNS records that must be added
        to your domain.
      operationId: EmailController_addDomain
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomDomainRequestBody'
        required: true
      responses:
        "200":
          description: Domain has been successfully added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomDomainDto'
        "400":
          description: Bad request.
        "401":
          description: Provide your API key.
        "403":
          description: "Please upgrade to a growth, premium or enterprise plan."
        "404":
          description: Not found.
      security:
      - access-key: []
  /v1/email/domains/{domainId}/verify:
    post:
      tags:
      - Email
      summary: Verify Domain
      description: Verify your domain based on the provided DNS records.
      operationId: EmailController_verifyDomain
      parameters:
      - name: domainId
        in: path
        description: The id of the custom domain object.
        required: true
        style: simple
        explode: false
        schema:
          type: string
        example: 63c5857475784b9acf05c919
      responses:
        "200":
          description: Domain has been successfully verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomDomainDto'
        "400":
          description: Bad request.
        "401":
          description: Provide your API key.
        "403":
          description: "Please upgrade to a growth, premium or enterprise plan."
        "404":
          description: Not found.
      security:
      - access-key: []
  /v1/email/domains/{domainId}:
